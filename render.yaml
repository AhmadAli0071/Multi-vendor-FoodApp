services:
  - type: web
    name: foodapp
    env: node
    region: singapore
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        value: admin@foodapp.pk
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        value: https://foodapp.onrender.com
      - key: CORS_ORIGINS
        value: https://foodapp.onrender.com
