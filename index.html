<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B35" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FoodApp" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      const path = window.location.pathname;
      const match = path.match(/\/r\/([^/]+)/);
      const isOwner = path.startsWith('/owner');
      const subdomain = window.location.hostname.split('.');
      let appName = 'FoodApp';
      if (match) {
        appName = match[1].charAt(0).toUpperCase() + match[1].slice(1).replace(/-/g, ' ');
      } else if (isOwner) {
        appName = 'Owner Panel';
      } else if (subdomain.length >= 3 && subdomain[0] !== 'www' && subdomain[0] !== 'admin' && subdomain[0] !== 'owner') {
        appName = subdomain[0].charAt(0).toUpperCase() + subdomain[0].slice(1).replace(/-/g, ' ');
      }
      document.title = appName + ' - Food Ordering';
      document.querySelector('meta[name="apple-mobile-web-app-title"]')?.setAttribute('content', appName);
    </script>
    <title>FoodApp - Food Ordering Platform</title>
    <meta name="description" content="Order delicious food from your favorite restaurants. Smart, fast, and easy food ordering platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(
            (registration) => { console.log('SW registered:', registration.scope); },
            (error) => { console.log('SW registration failed:', error); }
          );
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
